<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Studio OS — Choose Persona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="persona.css" />
</head>
<body class="persona-page">

  <div class="persona-screen">

    <div class="persona-screen__header">
      <h1 class="persona-screen__title">Choose <span class="persona-screen__title-accent">Persona</span></h1>
      <p class="persona-screen__subtitle">Every output locks to that brand's complete style guide.</p>
    </div>

    <div class="persona-grid">

      <!-- UDEN.tech -->
      <button class="persona-card" data-persona="uden_tech" data-label="UDEN.tech">
        <div class="persona-card__icon" style="background: rgba(229,90,30,0.12); border-color: #e55a1e;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e55a1e" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="persona-card__body">
          <span class="persona-card__name">UDEN.tech</span>
          <span class="persona-card__desc">AI career platform · Tier 2/3 students</span>
        </div>
        <div class="persona-card__dots">
          <span class="persona-dot" style="background:#e55a1e;"></span>
          <span class="persona-dot" style="background:#f0efe8;"></span>
        </div>
      </button>

      <!-- Viral Monkey -->
      <button class="persona-card" data-persona="viral_monkey" data-label="Viral Monkey">
        <div class="persona-card__icon" style="background: rgba(229,90,30,0.1); border-color: #e55a1e;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e55a1e" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            <path d="M18 6c1.5-1 3 0 3 2s-1.5 3-3 2"/>
          </svg>
        </div>
        <div class="persona-card__body">
          <span class="persona-card__name">Viral Monkey</span>
          <span class="persona-card__desc">YouTube growth &amp; viral content</span>
        </div>
        <div class="persona-card__dots">
          <span class="persona-dot" style="background:#e55a1e;"></span>
          <span class="persona-dot" style="background:#f5c518;"></span>
        </div>
      </button>

      <!-- Career & Jobs -->
      <button class="persona-card" data-persona="career_jobs" data-label="Career &amp; Jobs">
        <div class="persona-card__icon" style="background: rgba(59,139,212,0.1); border-color: #3b8bd4;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3b8bd4" stroke-width="1.5">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <div class="persona-card__body">
          <span class="persona-card__name">Career &amp; Jobs</span>
          <span class="persona-card__desc">Job market insights &amp; career guidance</span>
        </div>
        <div class="persona-card__dots">
          <span class="persona-dot" style="background:#3b8bd4;"></span>
          <span class="persona-dot" style="background:#f0efe8;"></span>
        </div>
      </button>

      <!-- Gov Outreach -->
      <button class="persona-card" data-persona="gov_outreach" data-label="Gov Outreach">
        <div class="persona-card__icon" style="background: rgba(29,158,117,0.1); border-color: #1d9e75;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1d9e75" stroke-width="1.5">
            <path d="M3 21h18"/>
            <path d="M5 21V7l7-4 7 4v14"/>
            <path d="M9 21V13h6v8"/>
          </svg>
        </div>
        <div class="persona-card__body">
          <span class="persona-card__name">Gov Outreach</span>
          <span class="persona-card__desc">B2G communications &amp; skill schemes</span>
        </div>
        <div class="persona-card__dots">
          <span class="persona-dot" style="background:#1d9e75;"></span>
          <span class="persona-dot" style="background:#5dcaa5;"></span>
          <span class="persona-dot" style="background:#f0efe8;"></span>
        </div>
      </button>

      <!-- Blank / Free Mode -->
      <button class="persona-card" data-persona="blank" data-label="Blank / Free Mode">
        <div class="persona-card__icon" style="background: rgba(138,100,255,0.1); border-color: #8a64ff;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8a64ff" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
          </svg>
        </div>
        <div class="persona-card__body">
          <span class="persona-card__name">Blank / Free Mode</span>
          <span class="persona-card__desc">No brand constraints — full creative freedom</span>
        </div>
        <div class="persona-card__dots">
          <span class="persona-dot" style="background:#5a5a5e;"></span>
          <span class="persona-dot" style="background:#f0efe8;"></span>
        </div>
      </button>

    </div>
  </div>

  <script src="persona.js"></script>
</body>
</html>
